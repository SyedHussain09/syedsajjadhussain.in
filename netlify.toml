[build]
  command = "npm run build:static"
  publish = "out"

[build.environment]
  NEXT_OUTPUT_EXPORT = "1"
  NEXT_TELEMETRY_DISABLED = "1"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
